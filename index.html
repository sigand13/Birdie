<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birdie! - Golfbollar i Anderstorp</title>
  <style>
    :root {
      --accent: #2c3e50;
      --text-dark: #1a1a1a;
      --bg-light: #f4f7f6;
      --white: #ffffff;
      --danger: #e74c3c;
      --success: #27ae60;
      --gold: #f1c40f;
      --warning: #ff7675;
      --restock: #3498db;
    }

    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-light); color: var(--text-dark); overflow-x: hidden; scroll-behavior: smooth; }

    header { display: flex; align-items: center; justify-content: space-between; padding: 15px 40px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); box-shadow: 0 2px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
    .logo { display: flex; align-items: center; gap: 15px; text-decoration: none; color: inherit; }
    .logo img { height: 60px; }
    nav { display: flex; gap: 30px; }
    nav a { text-decoration: none; color: var(--text-dark); font-weight: 600; }

    #info-banner { background: var(--danger); color: white; text-align: center; padding: 12px; font-weight: bold; font-size: 0.9rem; text-transform: uppercase; }

    .hero { height: 35vh; display: flex; justify-content: center; align-items: center; flex-direction: column; text-align: center; background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url('https://cdn.pixabay.com/photo/2025/05/13/16/10/golf-9597900_1280.jpg'); background-size: cover; background-position: center 40%; color: white; }

    .products { padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; max-width: 1200px; margin: auto; }
    
    .card { background: var(--white); border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: 0.4s ease; display: flex; flex-direction: column; position: relative; }
    .out-of-stock { opacity: 0.6; filter: grayscale(0.8); }

    /* Mängdväljare Styling */
    .qty-selector { display: flex; background: #eee; border-radius: 10px; margin: 15px 0 10px; padding: 3px; }
    .qty-btn { flex: 1; border: none; background: none; padding: 8px; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 0.8rem; transition: 0.2s; }
    .qty-btn.active { background: var(--white); box-shadow: 0 2px 5px rgba(0,0,0,0.1); color: var(--accent); }

    .savings-badge { color: var(--success); font-size: 0.75rem; font-weight: bold; margin-bottom: 5px; height: 1rem; }

    .price-tag { background: #f8f9fa; padding: 12px; border-radius: 12px; margin-bottom: 15px; }
    .price-row { display: flex; justify-content: space-between; align-items: center; }
    .total-price { font-size: 1.4rem; font-weight: 900; color: var(--accent); }

    .contact-btn { background: var(--accent); padding: 15px; border-radius: 12px; text-align: center; transition: 0.3s; }
    .contact-btn a { color: white !important; text-decoration: none; font-weight: 700; display: block; }
    .btn-disabled { background: #95a5a6 !important; cursor: not-allowed; }

    footer { text-align: center; padding: 50px; background: white; margin-top: 50px; }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <img src="https://i.imgur.com/uEtW7bB_d.webp?maxwidth=760&fidelity=grand" alt="Birdie Logo">
    <strong>Birdie!</strong>
  </a>
  <nav><a href="#produkter">Bollar</a><a href="#kontakt">Kontakt</a></nav>
</header>

<div id="info-banner">Laddar...</div>

<section class="hero">
  <h2>Birdie!</h2>
  <p>Smartare golfbollar i Anderstorp</p>
</section>

<section id="produkter" class="products"></section>

<footer id="kontakt">
  <p>📞 073-535 24 82 | Anderstorp</p>
</footer>

<script>
  const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRt7R8D1L1dUqZPpeHEtKf78BRRHYCMekm_j0a6ttC9Dzb5kiPWh7c5bKFpGXx5CJq_ZCB-HNzQV6Pv/pub?output=csv'; 

  function updatePrice(cardId, basePrice) {
    const card = document.getElementById(cardId);
    const selectedBtn = card.querySelector('.qty-btn.active');
    const qty = parseInt(selectedBtn.dataset.qty);
    const savingsEl = card.querySelector('.savings-badge');
    const priceEl = card.querySelector('.total-price');
    const buyLink = card.querySelector('.buy-link');
    const bollNamn = card.dataset.name;

    let totalPrice = basePrice * qty;
    let savings = 0;

    // Smart logik: Rabatt om man köper 3 dussin eller fler
    if (qty >= 3) {
      savings = 25; 
      totalPrice -= savings;
      savingsEl.innerText = `🎁 Mängdrabatt: -${savings} kr!`;
    } else {
      savingsEl.innerText = '';
    }

    priceEl.innerText = totalPrice + ' kr';
    
    // Uppdatera SMS-länken dynamiskt
    const smsBody = `Hej Birdie! Jag vill köpa ${qty} dussin ${bollNamn} för ${totalPrice} kr. Finns de kvar?`;
    buyLink.href = `sms:0735352482?body=${encodeURIComponent(smsBody)}`;
  }

  async function fetchLager() {
    try {
      const response = await fetch(SHEET_CSV_URL + '&cache=' + new Date().getTime());
      const data = await response.text();
      const rows = data.split('\n').filter(row => row.trim() !== '');
      
      const clean = (t) => t ? t.trim().replace(/^"|"$/g, '') : '';
      document.getElementById('info-banner').innerText = clean(rows[1].split(',')[10]) || "Välkommen!";

      const container = document.getElementById('produkter');
      const currentScroll = window.scrollY;
      container.innerHTML = '';

      rows.slice(1).forEach((row, index) => {
        const cols = row.includes(';') ? row.split(';') : row.split(',');
        const namn = clean(cols[0]);
        if (!namn) return;

        const dussinPris = parseInt(clean(cols[3]).replace(/\D/g, '')) || 0;
        const stock = parseInt(clean(cols[5])) || 0;
        const cardId = `card-${index}`;
        const isOut = stock < 12;

        const card = document.createElement('div');
        card.id = cardId;
        card.className = `card ${isOut ? 'out-of-stock' : ''}`;
        card.dataset.name = namn;

        card.innerHTML = `
          <div style="height:150px; display:flex; align-items:center; justify-content:center;">
            <img src="${clean(cols[8]) || ''}" style="max-height:100%; max-width:80%;">
          </div>
          <h3 style="margin:10px 0 5px;">${namn}</h3>
          
          <div class="qty-selector">
            <button class="qty-btn active" data-qty="1" onclick="selectQty('${cardId}', this, ${dussinPris})">1 dussin</button>
            <button class="qty-btn" data-qty="2" onclick="selectQty('${cardId}', this, ${dussinPris})">2 dussin</button>
            <button class="qty-btn" data-qty="3" onclick="selectQty('${cardId}', this, ${dussinPris})">3 dussin</button>
          </div>

          <div class="savings-badge"></div>
          
          <div class="price-tag">
            <div class="price-row">
              <span style="font-size:0.9rem; color:#666;">Totalt pris:</span>
              <span class="total-price">${dussinPris} kr</span>
            </div>
          </div>

          <div class="contact-btn ${isOut ? 'btn-disabled' : ''}">
            <a href="#" class="buy-link">${isOut ? 'Kommer snart' : 'Köp via SMS 💬'}</a>
          </div>
        `;
        container.appendChild(card);
        updatePrice(cardId, dussinPris);
      });
      window.scrollTo(0, currentScroll);
    } catch (e) { console.error(e); }
  }

  function selectQty(cardId, btn, basePrice) {
    const card = document.getElementById(cardId);
    card.querySelectorAll('.qty-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    updatePrice(cardId, basePrice);
  }

  fetchLager();
  setInterval(fetchLager, 10000); // Scannar var 10:e sek för att inte störa användaren för ofta
</script>
</body>
</html>
