<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birdie! - Golfbollar i Anderstorp</title>
  <style>
    :root {
      --accent: #2c3e50;
      --text-dark: #1a1a1a;
      --bg-light: #f4f7f6;
      --white: #ffffff;
      --danger: #e74c3c;
      --success: #27ae60;
      --restock: #3498db;
      --sold: #f1c40f;
    }

    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-light); color: var(--text-dark); }

    header { 
      display: flex; align-items: center; justify-content: space-between; padding: 15px 40px; 
      background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); 
      box-shadow: 0 2px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; 
    }
    .logo { display: flex; align-items: center; gap: 15px; text-decoration: none; color: inherit; }
    .logo img { height: 60px; }
    nav { display: flex; gap: 25px; }
    nav a { text-decoration: none; color: var(--text-dark); font-weight: 600; }

    #info-banner { background: var(--danger); color: white; text-align: center; padding: 12px; font-weight: bold; font-size: 0.9rem; transition: 0.3s; }

    .hero {
      height: 30vh; display: flex; justify-content: center; align-items: center; flex-direction: column; text-align: center;
      background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url('https://cdn.pixabay.com/photo/2025/05/13/16/10/golf-9597900_1280.jpg');
      background-size: cover; background-position: center 40%; color: white;
    }

    .products { padding: 30px 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; max-width: 1200px; margin: auto; }
    
    .card { background: var(--white); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: flex; flex-direction: column; transition: 0.5s ease; }
    .card.out-of-stock { opacity: 0.6; filter: grayscale(0.8); }

    .tag-container { display: flex; gap: 8px; margin-bottom: 12px; }
    .tag { padding: 5px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: bold; transition: 0.5s; }
    .tag-skick { background: var(--success); color: white; }
    .tag-lager { background: #eee; color: #666; }

    /* Animationer för lagerändring */
    .flash-restock { background: var(--restock) !important; color: white !important; transform: scale(1.1); }
    .flash-sold { background: var(--sold) !important; color: white !important; transform: scale(1.1); }

    .unit-toggle { display: flex; background: #f0f0f0; border-radius: 12px; padding: 4px; margin-bottom: 15px; gap: 4px; }
    .unit-btn { flex: 1; border: none; background: none; padding: 10px; cursor: pointer; border-radius: 10px; font-weight: bold; font-size: 0.8rem; transition: 0.2s; }
    .unit-btn.active { background: var(--white); box-shadow: 0 2px 8px rgba(0,0,0,0.1); color: var(--accent); }

    .qty-box { display: flex; align-items: center; justify-content: space-between; background: #f9f9f9; padding: 12px 20px; border-radius: 15px; border: 1px solid #eee; margin-bottom: 15px; }
    .qty-box input { border: none; background: transparent; width: 60px; font-size: 1.4rem; font-weight: 900; text-align: center; outline: none; color: var(--accent); }

    .price-display { background: var(--accent); color: white; padding: 20px; border-radius: 18px; margin-bottom: 15px; text-align: center; }
    .total-amt { display: block; font-size: 1.8rem; font-weight: 900; }
    .savings-msg { font-size: 0.8rem; color: var(--success); font-weight: bold; background: white; padding: 3px 10px; border-radius: 6px; display: inline-block; margin-top: 8px; min-height: 1.2rem; }

    .contact-btn { background: var(--success); padding: 18px; border-radius: 15px; text-align: center; transition: 0.3s; }
    .contact-btn a { color: white !important; text-decoration: none; font-weight: 800; display: block; width: 100%; }
    .btn-disabled { background: #bdc3c7 !important; pointer-events: none; }

    footer { text-align: center; padding: 40px; background: white; border-top: 1px solid #eee; margin-top: 50px; }
    .footer-links { margin-top: 10px; display: flex; justify-content: center; gap: 20px; font-size: 0.8rem; color: #999; }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <img src="https://i.imgur.com/mDvs8Wv.png">
    <strong>Birdie!</strong>
  </a>
  <nav><a href="#produkter">Bollar</a><a href="about.html">Om oss</a></nav>
</header>

<div id="info-banner">Ansluter till lager...</div>

<section class="hero">
  <h2>Birdie!</h2>
  <p>Live-lager direkt från Anderstorp</p>
</section>

<section id="produkter" class="products"></section>

<footer>
  <p>📞 <a href="tel:0735352482" style="color:inherit; text-decoration:none; font-weight:bold;">073-535 24 82</a> | Anderstorp</p>
  <div class="footer-links">
    <a href="privacy.html" style="color:inherit;">Integritetspolicy</a>
    <span>© 2026 Birdie! Golfbollar</span>
  </div>
</footer>

<script>
  const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRt7R8D1L1dUqZPpeHEtKf78BRRHYCMekm_j0a6ttC9Dzb5kiPWh7c5bKFpGXx5CJq_ZCB-HNzQV6Pv/pub?output=csv'; 
  let currentStockData = {};

  function parseNum(v) { return parseInt(v.toString().replace(/\D/g, '')) || 0; }

  function calculate(id, dPrice, stock) {
    const card = document.getElementById(id);
    if(!card) return;
    const isDussin = card.querySelector('.unit-btn.active').dataset.unit === 'dussin';
    const input = card.querySelector('.qty-input');
    const sPrice = Math.round(dPrice / 12);
    
    let qty = parseInt(input.value) || 0;
    const max = isDussin ? Math.floor(stock / 12) : stock;

    if (qty > max) { qty = max; input.value = max; }
    if (qty < 0) { qty = 0; input.value = 0; }

    let total = isDussin ? (dPrice * qty) : (sPrice * qty);
    let savings = (isDussin && qty >= 3) ? 25 : 0;
    total -= savings;

    card.querySelector('.total-amt').innerText = total + ' kr';
    card.querySelector('.savings-msg').innerText = savings > 0 ? `🎉 Mängdrabatt: -${savings} kr` : '';
    
    const buyLink = card.querySelector('.buy-link');
    if (qty > 0 && stock >= 1) {
      const unitLabel = isDussin ? "dussin" : "styck";
      const msg = `Hej Birdie! Jag vill köpa ${qty} ${unitLabel} ${card.dataset.name} för ${total} kr.`;
      buyLink.href = `sms:0735352482?body=${encodeURIComponent(msg)}`;
      card.querySelector('.contact-btn').classList.remove('btn-disabled');
    } else {
      card.querySelector('.contact-btn').classList.add('btn-disabled');
    }
  }

  async function fetchLager() {
    try {
      const res = await fetch(SHEET_CSV_URL + '&t=' + new Date().getTime());
      const data = await res.text();
      const rows = data.split('\n').filter(r => r.trim() !== '');
      const clean = (t) => t ? t.trim().replace(/^"|"$/g, '') : '';
      
      const bannerText = clean(rows[1].split(',')[10]);
      const bannerEl = document.getElementById('info-banner');
      if(bannerEl.innerText !== bannerText) bannerEl.innerText = bannerText || "Välkommen!";

      const container = document.getElementById('produkter');

      rows.slice(1).forEach((row, i) => {
        const cols = row.includes(';') ? row.split(';') : row.split(',');
        const namn = clean(cols[0]), dPrice = parseNum(cols[3]), lager = parseNum(cols[5]), cardId = `c-${i}`;
        if (!namn) return;

        let card = document.getElementById(cardId);
        
        // Om kortet inte finns, skapa det en gång
        if (!card) {
          card = document.createElement('div');
          card.id = cardId;
          card.className = 'card';
          card.dataset.name = namn;
          card.innerHTML = `
            <div style="height:140px; display:flex; align-items:center; justify-content:center; margin-bottom:15px; background:#f9f9f9; border-radius:12px;">
              <img src="${clean(cols[8]) || ''}" style="max-height:85%; max-width:85%; object-fit:contain;">
            </div>
            <div class="tag-container">
              <span class="tag tag-skick">${clean(cols[6])}</span>
              <span class="tag tag-lager">Lager: ${lager} st</span>
            </div>
            <h3 style="margin:0 0 15px 0;">${namn}</h3>
            <div class="unit-toggle">
              <button class="unit-btn active" data-unit="dussin" onclick="changeUnit('${cardId}', this, ${dPrice}, ${lager})">Dussin</button>
              <button class="unit-btn" data-unit="styck" onclick="changeUnit('${cardId}', this, ${dPrice}, ${lager})">Styck</button>
            </div>
            <div class="qty-box">
              <span style="font-size:0.8rem; font-weight:bold; color:#999;">Antal:</span>
              <input type="number" class="qty-input" value="1" oninput="calculate('${cardId}', ${dPrice}, ${lager})">
              <span class="unit-txt" style="font-size:0.8rem; font-weight:bold; color:var(--accent);">dussin</span>
            </div>
            <div class="price-display">
              <span style="font-size:0.8rem; opacity:0.8;">Totalt att betala:</span>
              <span class="total-amt">${dPrice} kr</span>
              <div class="savings-msg"></div>
            </div>
            <div class="contact-btn"><a class="buy-link">Beställ via SMS 💬</a></div>
          `;
          container.appendChild(card);
        }

        // Uppdatera värden om de ändrats
        const oldLager = currentStockData[cardId] || lager;
        const lagerTag = card.querySelector('.tag-lager');
        
        if (oldLager !== lager) {
          lagerTag.innerText = `Lager: ${lager} st`;
          // Effekt
          const effectClass = lager > oldLager ? 'flash-restock' : 'flash-sold';
          lagerTag.classList.add(effectClass);
          setTimeout(() => lagerTag.classList.remove(effectClass), 2000);
        }

        card.classList.toggle('out-of-stock', lager < 12);
        const buyBtnText = card.querySelector('.buy-link');
        buyBtnText.innerText = lager < 1 ? 'HELT SLUT' : (lager < 12 ? 'FÅ KVAR - SMSA' : 'Beställ via SMS 💬');

        currentStockData[cardId] = lager;
        calculate(cardId, dPrice, lager);
      });
    } catch (e) { console.error(e); }
  }

  function changeUnit(id, btn, p, s) {
    const card = document.getElementById(id);
    card.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    card.querySelector('.unit-txt').innerText = btn.dataset.unit;
    calculate(id, p, s);
  }

  fetchLager();
  setInterval(fetchLager, 5000);
</script>
</body>
</html>
