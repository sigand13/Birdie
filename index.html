<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birdie! - Golfbollar i Anderstorp</title>
  <style>
    :root {
      --accent: #2c3e50;
      --text-dark: #1a1a1a;
      --bg-light: #f4f7f6;
      --white: #ffffff;
      --danger: #e74c3c;
      --success: #27ae60;
      --gold: #f1c40f;
      --warning: #ff7675;
      --restock: #3498db;
    }

    body { 
      margin: 0; 
      font-family: 'Inter', -apple-system, sans-serif; 
      background: var(--bg-light); 
      color: var(--text-dark); 
      overflow-x: hidden; 
      scroll-behavior: smooth;
    }

    header { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding: 15px 40px; 
      background: rgba(255, 255, 255, 0.95); 
      backdrop-filter: blur(10px);
      box-shadow: 0 2px 15px rgba(0,0,0,0.05); 
      position: sticky; 
      top: 0; 
      z-index: 1000; 
    }

    .logo { display: flex; align-items: center; gap: 15px; text-decoration: none; color: inherit; }
    .logo img { height: 60px; }
    
    nav { display: flex; gap: 30px; }
    nav a { text-decoration: none; color: var(--text-dark); font-weight: 600; transition: 0.3s; }
    nav a:hover { color: var(--danger); }

    #info-banner {
      background: var(--danger);
      color: white;
      text-align: center;
      padding: 12px;
      font-weight: bold;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .hero {
      height: 35vh; 
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url('https://cdn.pixabay.com/photo/2025/05/13/16/10/golf-9597900_1280.jpg');
      background-size: cover;
      background-position: center 40%; 
      color: white;
    }
    .hero h2 { font-size: 3.5rem; margin: 0; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }

    .filter-container { text-align: center; padding: 40px 20px 10px; }
    .filter-btn {
      padding: 10px 22px;
      border: 2px solid var(--accent);
      background: transparent;
      cursor: pointer;
      border-radius: 25px;
      font-weight: 600;
      margin: 5px;
      transition: 0.3s;
    }
    .filter-btn.active, .filter-btn:hover { background: var(--accent); color: white; }

    .products { 
      padding: 20px; 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
      gap: 25px; 
      max-width: 1200px; 
      margin: auto; 
    }

    .card { 
      background: var(--white); 
      border-radius: 20px; 
      padding: 20px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
      transition: 0.4s ease; 
      display: flex;
      flex-direction: column;
      opacity: 0;
      transform: translateY(20px);
      position: relative;
    }
    .card.show { opacity: 1; transform: translateY(0); }
    .card:hover { transform: translateY(-10px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }

    .product-img-wrapper {
      width: 100%;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 15px;
      background: #f9f9f9;
      border-radius: 12px;
      overflow: hidden;
    }
    .product-img { max-width: 90%; max-height: 90%; object-fit: contain; }

    .tag-container { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }

    .condition-tag {
      background: var(--success); color: white; padding: 4px 10px; border-radius: 6px;
      font-size: 0.7rem; font-weight: bold; text-transform: uppercase;
    }

    .stock-tag { background: #eee; color: #555; padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; }

    .restock-tag {
      background: var(--restock);
      color: white;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: bold;
      text-transform: uppercase;
    }

    .low-stock-alert {
      background: var(--warning);
      color: white;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: bold;
      animation: blinker 1.5s linear infinite;
    }

    @keyframes blinker { 50% { opacity: 0.5; } }

    .deal-badge {
      position: absolute; top: -12px; right: 15px; background: var(--gold); color: #000;
      padding: 6px 14px; border-radius: 8px; font-size: 0.75rem; font-weight: 900; z-index: 10;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

    .out-of-stock { opacity: 0.6; filter: grayscale(0.8); }
    
    /* Blå ram om påfyllning är på väg */
    .restock-card { border: 2px solid var(--restock) !important; }

    .price-tag { margin: 10px 0; padding: 12px; background: #f8f9fa; border-radius: 12px; flex-grow: 1; }
    .price-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .price-value { font-weight: 800; color: var(--accent); }
    .old-price { font-size: 0.8rem; color: #999; text-decoration: line-through; display: block; margin-bottom: 2px; }
    
    .contact-btn { background: var(--accent); padding: 12px; border-radius: 10px; text-align: center; transition: 0.3s; }
    .contact-btn a { color: white !important; text-decoration: none; font-weight: 600; display: block; }
    .contact-btn:hover { background: #34495e; }
    
    /* Grå knapp endast om lagret är HELT slut och påfyllning väntar */
    .btn-disabled { background: #95a5a6 !important; cursor: not-allowed; }

    footer { text-align: center; padding: 50px; background: white; border-top: 1px solid #eee; }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <img src="https://i.imgur.com/uEtW7bB_d.webp?maxwidth=760&fidelity=grand" alt="Birdie Logo">
    <strong>Birdie!</strong>
  </a>
  <nav>
    <a href="#produkter">Bollar</a>
    <a href="about.html">Om oss</a>
    <a href="#kontakt">Kontakt</a>
  </nav>
</header>

<div id="info-banner">Välkommen till Birdie!</div>

<section class="hero">
  <h2>Birdie!</h2>
  <p>Premium golfbollar. Anderstorp.</p>
</section>

<div class="filter-container">
  <button class="filter-btn active" onclick="filterBolls('all', this)">Alla bollar</button>
  <button class="filter-btn" onclick="filterBolls('premium', this)">Premium</button>
  <button class="filter-btn" onclick="filterBolls('prisvärd', this)">Prisvärda</button>
</div>

<div id="loading-spinner" style="text-align:center; padding:50px; font-weight:bold;">Hämtar aktuellt lager...</div>
<section id="produkter" class="products"></section>

<footer id="kontakt">
  <p>📞 <a href="tel:0735352482" style="color:inherit; text-decoration:none;">073-535 24 82</a> | Anderstorp</p>
  <p>© 2026 Birdie! Golfbollar | <a href="about.html" style="color: #666; text-decoration: none;">Om oss</a></p>
</footer>

<script>
  const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRt7R8D1L1dUqZPpeHEtKf78BRRHYCMekm_j0a6ttC9Dzb5kiPWh7c5bKFpGXx5CJq_ZCB-HNzQV6Pv/pub?output=csv'; 

  async function fetchLager() {
    try {
      const response = await fetch(SHEET_CSV_URL);
      const data = await response.text();
      const rows = data.split('\n').filter(row => row.trim() !== '');
      
      const bannerCols = rows[1] ? (rows[1].includes(';') ? rows[1].split(';') : rows[1].split(',')) : [];
      const bannerText = bannerCols[10] ? bannerCols[10].replace(/^"|"$/g, '').trim() : "Välkommen till Birdie!";
      document.getElementById('info-banner').innerText = bannerText;

      const productRows = rows.slice(1);
      const container = document.getElementById('produkter');
      container.innerHTML = '';
      document.getElementById('loading-spinner').style.display = 'none';

      const today = new Date();
      today.setHours(0,0,0,0);

      productRows.forEach((row) => {
        const columns = row.includes(';') ? row.split(';') : row.split(',');
        const clean = (t) => t ? t.trim().replace(/^"|"$/g, '') : '';
        
        const namn = clean(columns[0]);
        if (!namn) return;

        const nypris = clean(columns[1]);
        const styck = clean(columns[2]);
        const dussin = clean(columns[3]);
        const kat = clean(columns[4]);
        const lager = clean(columns[5]);
        const skick = clean(columns[6]);
        const special = clean(columns[7]); 
        const bildUrl = clean(columns[8]);
        const restockDatumStr = clean(columns[9]); 

        // Restock-logik
        let isRestockUpcoming = false;
        if (restockDatumStr) {
          const restockDate = new Date(restockDatumStr);
          if (restockDate > today) isRestockUpcoming = true;
        }

        const isOutOfStock = (lager.toLowerCase().includes('slut') || lager === '0');
        const stockCount = parseInt(lager);
        const isLowStock = !isNaN(stockCount) && stockCount > 0 && stockCount <= 10;
        const isDeal = special.toLowerCase() === 'deal';
        const finalImg = bildUrl || 'https://cdn-icons-png.flaticon.com/512/5218/5218551.png';

        const card = document.createElement('div');
        // Lägg till blå ram om det planeras en påfyllning
        card.className = `card ${isOutOfStock ? 'out-of-stock' : ''} ${isRestockUpcoming ? 'restock-card' : ''}`;
        card.setAttribute('data-category', kat.toLowerCase());

        card.innerHTML = `
          ${isDeal ? `<div class="deal-badge">VECKANS DEAL! 🌟</div>` : ''}
          <div class="product-img-wrapper">
            <img src="${finalImg}" class="product-img" alt="${namn}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/5218/5218551.png'">
          </div>
          
          <div class="tag-container">
            <div class="condition-tag">${skick}</div>
            ${isRestockUpcoming ? `<div class="restock-tag">🕒 PÅFYLLNING: ${restockDatumStr}</div>` : ''}
            ${!isOutOfStock && !isLowStock && !isNaN(stockCount) ? `<div class="stock-tag">Finns ${lager} st</div>` : ''}
            ${isLowStock ? `<div class="low-stock-alert">🔥 Snart slut! (Finns ${lager} st)</div>` : ''}
          </div>
          
          ${isOutOfStock ? `<div class="out-of-stock-label">SLUT I LAGER</div>` : ''}
          
          <h3 style="margin: 0 0 8px 0; font-size: 1.25rem;">${namn}</h3>
          <span class="old-price">${nypris.includes('ca') ? nypris : 'Nypris ca ' + nypris}</span>
          
          <div class="price-tag">
            <div class="price-row"><span>Boll:</span><span class="price-value">${styck}</span></div>
            <div class="price-row"><span>Dussin:</span><span class="price-value">${dussin}</span></div>
          </div>

          <div class="contact-btn ${isOutOfStock ? 'btn-disabled' : ''}">
            <a href="${isOutOfStock ? '#' : 'tel:0735352482'}">
              ${isOutOfStock ? 'Kommer snart' : 'Ring/SMS för köp'}
            </a>
          </div>
        `;
        container.appendChild(card);
      });

      const observer = new IntersectionObserver(entries => { entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('show'); }); }, { threshold: 0.1 });
      document.querySelectorAll('.card').forEach(card => observer.observe(card));
    } catch (error) { document.getElementById('loading-spinner').innerText = "Kunde inte ladda lagret."; }
  }

  function filterBolls(category, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.card').forEach(card => {
      const cardCat = card.getAttribute('data-category');
      card.style.display = (category === 'all' || cardCat === category) ? "flex" : "none";
    });
  }

  fetchLager();
</script>

</body>
</html>
