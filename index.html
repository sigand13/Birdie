<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birdie! - Golfbollar i Anderstorp</title>
  <style>
    :root {
      --accent: #2c3e50;
      --text-dark: #1a1a1a;
      --bg-light: #f4f7f6;
      --white: #ffffff;
      --danger: #e74c3c;
      --success: #27ae60;
      --gold: #f1c40f;
      --warning: #ff7675;
      --restock: #3498db;
    }

    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-light); color: var(--text-dark); overflow-x: hidden; scroll-behavior: smooth; }

    /* Fixad Meny */
    header { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding: 15px 40px; 
      background: rgba(255, 255, 255, 0.95); 
      backdrop-filter: blur(10px); 
      box-shadow: 0 2px 15px rgba(0,0,0,0.05); 
      position: sticky; 
      top: 0; 
      z-index: 1000; 
    }
    .logo { display: flex; align-items: center; gap: 15px; text-decoration: none; color: inherit; }
    .logo img { height: 60px; }
    nav { display: flex; gap: 30px; }
    nav a { text-decoration: none; color: var(--text-dark); font-weight: 600; transition: 0.3s; }
    nav a:hover { color: var(--danger); }

    #info-banner { background: var(--danger); color: white; text-align: center; padding: 12px; font-weight: bold; font-size: 0.9rem; text-transform: uppercase; }

    .hero { height: 35vh; display: flex; justify-content: center; align-items: center; flex-direction: column; text-align: center; background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url('https://cdn.pixabay.com/photo/2025/05/13/16/10/golf-9597900_1280.jpg'); background-size: cover; background-position: center 40%; color: white; }

    .products { padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: auto; }
    
    .card { background: var(--white); border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: 0.4s ease; display: flex; flex-direction: column; position: relative; }
    .card.fade-in { opacity: 1; transform: translateY(0); }
    .out-of-stock { opacity: 0.6; filter: grayscale(0.8); }
    .restock-card { border: 2px solid var(--restock) !important; }

    .tag-container { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
    .condition-tag { background: var(--success); color: white; padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; }
    .restock-tag { background: var(--restock); color: white; padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; }
    .low-stock-alert { background: var(--warning); color: white; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; animation: blinker 1.5s linear infinite; }
    @keyframes blinker { 50% { opacity: 0.5; } }

    .price-tag { margin: 10px 0; padding: 12px; background: #f8f9fa; border-radius: 12px; flex-grow: 1; }
    .price-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .price-value { font-weight: 800; color: var(--accent); }

    .contact-btn { background: var(--accent); padding: 12px; border-radius: 10px; text-align: center; transition: 0.3s; }
    .contact-btn a { color: white !important; text-decoration: none; font-weight: 600; display: block; }
    .btn-disabled { background: #95a5a6 !important; cursor: not-allowed; }

    /* Popup */
    #sales-popup { position: fixed; bottom: -100px; left: 20px; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 12px; z-index: 2000; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); max-width: 300px; border-left: 5px solid var(--success); }
    #sales-popup.active { bottom: 20px; }

    footer { text-align: center; padding: 50px; background: white; border-top: 1px solid #eee; margin-top: 50px; }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <img src="https://i.imgur.com/uEtW7bB_d.webp?maxwidth=760&fidelity=grand" alt="Birdie Logo">
    <strong>Birdie!</strong>
  </a>
  <nav>
    <a href="#produkter">Bollar</a>
    <a href="about.html">Om oss</a>
    <a href="#kontakt">Kontakt</a>
  </nav>
</header>

<div id="info-banner">Välkommen till Birdie!</div>

<section class="hero">
  <h2>Birdie!</h2>
  <p>Premium golfbollar. Anderstorp.</p>
</section>

<section id="produkter" class="products"></section>

<div id="sales-popup">
  <div style="background: #e8f6ed; padding: 10px; border-radius: 50%;">📦</div>
  <div style="font-size: 0.85rem;">
    <span id="sales-text"></span>
    <span style="font-size: 0.7rem; color: #888; display: block; margin-top: 4px;">för <span id="sales-mins"></span> min sedan</span>
  </div>
</div>

<footer id="kontakt">
  <p>📞 <a href="tel:0735352482" style="color:inherit; text-decoration:none;">073-535 24 82</a> | Anderstorp</p>
</footer>

<script>
  const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRt7R8D1L1dUqZPpeHEtKf78BRRHYCMekm_j0a6ttC9Dzb5kiPWh7c5bKFpGXx5CJq_ZCB-HNzQV6Pv/pub?output=csv'; 

  async function fetchLager() {
    try {
      // Lägger till en slumpmässig parameter för att tvinga webbläsaren att hämta ny data (bypass cache)
      const response = await fetch(SHEET_CSV_URL + '&cache=' + new Date().getTime());
      const data = await response.text();
      const rows = data.split('\n').filter(row => row.trim() !== '');
      
      const firstRowCols = rows[1] ? (rows[1].includes(';') ? rows[1].split(';') : rows[1].split(',')) : [];
      const clean = (t) => t ? t.trim().replace(/^"|"$/g, '') : '';

      // Uppdatera Banner
      document.getElementById('info-banner').innerText = clean(firstRowCols[10]) || "Välkommen!";

      const container = document.getElementById('produkter');
      let htmlContent = '';

      rows.slice(1).forEach((row) => {
        const cols = row.includes(';') ? row.split(';') : row.split(',');
        const namn = clean(cols[0]);
        if (!namn) return;

        const stock = parseInt(clean(cols[5])) || 0;
        const restockStr = clean(cols[9]);
        const isRestockUpcoming = restockStr && new Date(restockStr) > new Date();

        const isOutOfStock = stock < 12 && !isRestockUpcoming;
        const isLowStock = stock >= 12 && stock <= 20;

        htmlContent += `
          <div class="card ${isOutOfStock ? 'out-of-stock' : ''} ${isRestockUpcoming ? 'restock-card' : ''} fade-in">
            <div style="height:160px; display:flex; align-items:center; justify-content:center; background:#f9f9f9; border-radius:12px; margin-bottom:15px;">
              <img src="${clean(cols[8]) || 'https://cdn-icons-png.flaticon.com/512/5218/5218551.png'}" style="max-height:85%; max-width:85%; object-fit:contain;">
            </div>
            <div class="tag-container">
              <div class="condition-tag">${clean(cols[6])}</div>
              ${isRestockUpcoming ? `<div class="restock-tag">🕒 PÅFYLLNING: ${restockStr}</div>` : ''}
              ${isLowStock ? `<div class="low-stock-alert">🔥 Snart slut! (${stock} st kvar)</div>` : (!isOutOfStock ? `<div style="background:#eee; padding:4px 10px; border-radius:6px; font-size:0.7rem;">Lager: ${stock} st</div>` : '')}
            </div>
            ${isOutOfStock ? `<div style="color:var(--danger); font-weight:bold; font-size:0.8rem; margin-bottom:10px;">SLUT I LAGER</div>` : ''}
            <h3 style="margin:0 0 5px 0;">${namn}</h3>
            <div class="price-tag">
              <div class="price-row"><span>Styck:</span><span class="price-value">${clean(cols[2])}</span></div>
              <div class="price-row"><span>Dussin:</span><span class="price-value">${clean(cols[3])}</span></div>
            </div>
            <div class="contact-btn ${isOutOfStock ? 'btn-disabled' : ''}">
              <a href="${isOutOfStock ? '#' : 'tel:0735352482'}">${isOutOfStock ? 'Kommer snart' : 'Ring/SMS för köp'}</a>
            </div>
          </div>
        `;
      });

      container.innerHTML = htmlContent;

      // Popup-logik (endast första gången)
      if (!window.popupShown && clean(firstRowCols[11])) {
        document.getElementById('sales-text').innerText = clean(firstRowCols[11]);
        document.getElementById('sales-mins').innerText = clean(firstRowCols[12]);
        setTimeout(() => document.getElementById('sales-popup').classList.add('active'), 3000);
        window.popupShown = true;
      }

    } catch (e) { console.error("Kunde inte hämta data:", e); }
  }

  // Kör direkt vid start
  fetchLager();

  // Kolla efter uppdateringar var 5:e sekund (5000 ms)
  setInterval(fetchLager, 5000);
</script>
</body>
</html>
